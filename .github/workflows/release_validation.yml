# ============================================================================
# GitHub Actions Workflow - Release Validation
# ============================================================================
# Automatically runs validation harness on release tags
# ============================================================================

name: Release Validation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to validate'
        required: true
        default: 'v1.0.0-gold'

jobs:
  validate:
    name: Validate Release
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event.inputs.tag || github.ref_name }}
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v4
      
    - name: Cache Build
      uses: actions/cache@v4
      with:
        path: build-validation
        key: ${{ runner.os }}-build-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-build-
          
    - name: Run Validation Harness
      shell: pwsh
      run: |
        $tag = "${{ github.event.inputs.tag || github.ref_name }}"
        Write-Host "Validating tag: $tag"
        
        $result = & .\ci\release_validation_harness.ps1 -Tag $tag 2&1
        $exitCode = $LASTEXITCODE
        
        # Output results
        $result | ForEach-Object { Write-Host $_ }
        
        if ($exitCode -ne 0) {
            exit $exitCode
        }
        
    - name: Upload Validation Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-report-${{ github.run_id }}
        path: |
          validation-*.json
          validation-*.log
        retention-days: 30
        
    - name: Create Release
      if: success() && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build-validation/bin/RawrXD-Win32IDE.exe
          build-validation/bin/*.dll
        body: |
          ## RawrXD ${{ github.ref_name }} Release
          
          ### Validation Status
          ✅ All validation checks passed
          
          ### Components
          - AST Context Wiring: Enabled
          - FP8 KV Quantization: Enabled
          - Double-Buffer Pipeline: Enabled
          - Lock-Free Agent Coordinator: Enabled
          
          ### System Requirements
          - Windows 10/11 x64
          - Vulkan 1.3+ capable GPU
          - 16GB+ RAM (for 70B models)
          
          ### Installation
          1. Download RawrXD-Win32IDE.exe
          2. Run installer
          3. Configure model path in settings
          
          ### Verification
          Run `tests\ast_test.exe` to verify AST scope-awareness
        draft: false
        prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
